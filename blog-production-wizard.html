<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Production Wizard · Alex E. Daley Creative</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&family=Caveat:wght@500;600&display=swap');
  :root{
    --black:#000; --cyan:#19FCFC; --teal:#013B46; --white:#fff;
    --aqua-more:#00A9C9; --gray:#DADADA; --traditional-teal:#017A91;
    --ink:#0d1719; --muted:#5c6c6f; --line:#e8ebeb;
    --tint:rgba(1,59,70,.045); --tint2:rgba(25,252,252,.10); --teal-hover:#02525f;
    --radius:14px; --radius-sm:10px; --radius-pill:20px;
    --shadow:0 1px 0 rgba(1,59,70,.02), 0 18px 40px -28px rgba(1,59,70,.45);
    --font-ui:'Jost', system-ui, sans-serif; --font-hand:'Caveat', cursive;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--font-ui);color:var(--ink);
    background:radial-gradient(900px 460px at 100% -10%, var(--tint2), transparent 60%),radial-gradient(700px 520px at -10% 110%, var(--tint), transparent 55%),var(--white);
    min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5;padding:28px 18px 60px;}
  .wrap{max-width:680px;margin:0 auto;}

  header.app{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap;}
  .brandwrap{display:flex;align-items:center;gap:13px;min-width:0;}
  .logo{height:38px;width:auto;display:block;}
  .tool-label{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);font-weight:600;padding-left:13px;border-left:1px solid var(--line);}
  .reset-btn{border:1px solid var(--line);background:#fff;color:var(--muted);font-family:var(--font-ui);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;border-radius:var(--radius-pill);cursor:pointer;transition:.15s;}
  .reset-btn:hover{border-color:#000;color:#000;background:#f5f5f5;}

  .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}

  .rail{padding:20px 26px 0;}
  .rail-top{display:flex;justify-content:space-between;align-items:baseline;font-size:.7rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
  .rail-top .pct{color:var(--teal);font-weight:600;}
  .track{height:7px;background:var(--gray);border-radius:999px;overflow:hidden;}
  .fill{height:100%;width:0;background:linear-gradient(90deg,#000,var(--cyan));border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1);}

  .pad{padding:28px 30px 30px;}
  .step-meta{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:9px;}
  .step-meta .dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 2px var(--tint2);}
  .step h2{font-size:1.4rem;letter-spacing:-.01em;margin:0 0 11px;line-height:1.2;color:var(--ink);font-weight:600;}
  .step .lead{color:var(--muted);font-size:1rem;margin:0 0 4px;}

  .links{margin:18px 0 4px;display:flex;flex-wrap:wrap;gap:10px;}
  .links a{display:inline-flex;align-items:center;gap:9px;text-decoration:none;background:#000;color:var(--cyan);border:1px solid #000;font-size:.86rem;font-weight:500;padding:10px 15px;border-radius:var(--radius-sm);transition:.16s;}
  .links a:hover{background:#15242a;border-color:#15242a;transform:translateY(-1px);box-shadow:0 9px 22px -10px rgba(0,0,0,.55);text-decoration:none;}
  .links a svg{width:20px;height:20px;fill:var(--cyan);}

  .note{margin:18px 0 4px;background:var(--tint);border:1px solid var(--line);border-radius:var(--radius-sm);padding:15px 17px;font-size:.9rem;color:var(--ink);}
  .note .note-h{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:var(--teal);margin-bottom:9px;}
  .note dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:5px 16px;}
  .note dt{font-weight:600;color:var(--ink);} .note dd{margin:0;color:var(--muted);}

  .notebox{margin:18px 0 0;}
  .notebox .lab{display:block;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:8px;}
  .notebox .hint{font-size:.78rem;color:var(--muted);margin:6px 2px 0;}
  textarea,input[type=text]{width:100%;font-family:var(--font-ui);font-size:1rem;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;transition:border .16s,box-shadow .16s;resize:vertical;}
  textarea:focus,input[type=text]:focus{outline:none;border-color:#000;box-shadow:0 0 0 4px var(--tint2);}
  textarea.grow{min-height:96px;line-height:1.5;overflow:hidden;}

  .fld{display:block;margin-top:18px;}
  .fld .lab{display:block;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:8px;}
  .field-row{display:flex;gap:14px;}
  .field-row .fld{flex:1;margin-top:18px;}
  .field-row .fld input{max-width:160px;}

  .todos{margin:20px 0 2px;border-top:1px dashed var(--line);padding-top:18px;}
  .todos-h{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;}
  .todos-h .cnt{color:var(--teal);}
  .todo{display:flex;align-items:flex-start;gap:12px;padding:9px 0;cursor:pointer;}
  .todo input{position:absolute;opacity:0;width:0;height:0;}
  .box{flex:none;width:22px;height:22px;border-radius:6px;border:1.5px solid var(--gray);background:#fff;display:grid;place-items:center;transition:.15s;margin-top:1px;}
  .box svg{width:14px;height:14px;fill:#fff;opacity:0;transform:scale(.6);transition:.16s;}
  .todo input:checked + .box,.chk input:checked + .box{background:#000;border-color:#000;}
  .todo input:checked + .box svg,.chk input:checked + .box svg{opacity:1;transform:scale(1);fill:var(--cyan);}
  .chk input{position:absolute;opacity:0;width:0;height:0;}
  .chk{display:flex;cursor:pointer;margin:0;}
  .todo .txt{font-size:.95rem;color:var(--ink);transition:.15s;padding-top:1px;}
  .todo .txt .quote{display:block;margin-top:7px;background:var(--tint);border-left:3px solid #000;padding:8px 11px;border-radius:0 8px 8px 0;color:var(--muted);font-size:.88rem;}
  .todolink{color:#000;font-weight:600;text-decoration:underline;text-decoration-color:var(--cyan);text-decoration-thickness:2px;text-underline-offset:3px;}
  .todolink:hover{color:#000;text-decoration-color:#000;}
  .copyable{cursor:copy;border-bottom:1px dotted var(--cyan);} .copyable.copied{color:#000;}

  .copychip{display:inline-flex;align-items:center;gap:7px;margin:8px 8px 0 0;cursor:pointer;background:#fff;border:1px solid var(--line);border-radius:var(--radius-pill);padding:6px 12px;font-size:.82rem;color:var(--ink);transition:.15s;font-family:var(--font-ui);}
  .copychip:hover{border-color:#000;background:#f5f5f5;color:#000;}
  .copychip.copied{background:var(--cyan);color:#000;border-color:var(--cyan);}

  .promptbox{max-height:200px;overflow-y:auto;white-space:pre-wrap;background:#fff;border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 15px;font-size:.9rem;color:var(--ink);line-height:1.55;}
  .btn-prompt{margin-top:13px;font-family:var(--font-ui);cursor:pointer;border:1px solid #000;border-radius:var(--radius-sm);background:#000;color:var(--cyan);font-weight:500;font-size:.88rem;padding:10px 18px;display:inline-flex;align-items:center;gap:9px;transition:.16s;}
  .btn-prompt:hover{background:#15242a;border-color:#15242a;transform:translateY(-1px);box-shadow:0 9px 22px -10px rgba(0,0,0,.55);}
  .btn-prompt.done{background:var(--cyan);border-color:var(--cyan);color:#000;}
  .btn-prompt.done svg{fill:#000;}
  .btn-prompt svg{width:16px;height:16px;fill:var(--cyan);}

  .out-item{align-items:flex-start;cursor:default;}
  .out-label{display:block;}
  .out-note{display:block;margin-top:6px;font-size:.82rem;color:var(--muted);background:var(--tint);border-left:3px solid #000;padding:7px 10px;border-radius:0 8px 8px 0;}
  .out-copy{margin-top:9px;font-family:var(--font-ui);cursor:pointer;border:1px solid var(--line);background:#fff;color:#000;font-weight:600;font-size:.78rem;padding:6px 13px;border-radius:var(--radius-pill);display:inline-flex;align-items:center;gap:7px;transition:.15s;}
  .out-copy:hover{background:#f5f5f5;border-color:#000;}
  .out-copy.done{background:var(--cyan);color:#000;border-color:var(--cyan);}
  .out-copy svg{width:13px;height:13px;fill:currentColor;opacity:.7;}

  .fcopy{align-items:flex-start;cursor:default;}
  .fcopy-check{display:flex;cursor:pointer;margin:0;}
  .fcopy-link{color:#000;font-weight:600;text-decoration:underline;text-decoration-color:var(--cyan);text-decoration-thickness:2px;text-underline-offset:3px;cursor:pointer;}
  .fcopy-link:hover{color:#000;text-decoration-color:#000;}
  .fcopy-status{display:block;margin-top:4px;font-size:.8rem;color:var(--muted);}
  .fcopy-status.ok{color:var(--teal);font-weight:600;}

  details.expand{margin-top:6px;border-top:1px dashed var(--line);padding-top:12px;}
  details.expand summary{cursor:pointer;font-size:.82rem;font-weight:600;color:#000;letter-spacing:.04em;list-style:none;display:flex;align-items:center;gap:7px;}
  details.expand summary::-webkit-details-marker{display:none;}
  details.expand summary::before{content:"\25B8";transition:.18s;display:inline-block;color:var(--cyan);}
  details.expand[open] summary::before{transform:rotate(90deg);}
  details.expand .expand-body{margin-top:10px;background:var(--tint);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 15px;font-size:.88rem;color:var(--ink);}
  details.expand .expand-body dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:5px 16px;}
  details.expand .expand-body dt{font-weight:600;color:var(--ink);} details.expand .expand-body dd{margin:0;color:var(--muted);}

  .nav{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 30px 26px;border-top:1px solid var(--line);background:var(--tint);}
  button.btn{font-family:var(--font-ui);cursor:pointer;border-radius:var(--radius-sm);transition:.16s;font-weight:500;}
  .btn-primary{background:#000;color:var(--cyan);border:1px solid #000;padding:12px 22px;font-size:.94rem;display:inline-flex;align-items:center;gap:9px;}
  .btn-primary:hover{background:#15242a;border-color:#15242a;transform:translateY(-1px);box-shadow:0 9px 22px -10px rgba(0,0,0,.55);}
  .btn-primary:disabled{background:var(--gray);border-color:var(--gray);color:#fff;cursor:not-allowed;transform:none;box-shadow:none;}
  .btn-primary.is-next{background:#000;border-color:var(--cyan);color:var(--cyan);}
  .btn-primary .ck{width:20px;height:20px;}
  .btn-ghost{background:#fff;border:1px solid var(--line);color:var(--muted);padding:11px 18px;font-size:.86rem;}
  .btn-ghost:hover{border-color:#000;color:#000;background:#f5f5f5;}
  .guard-hint{font-size:.78rem;color:var(--muted);margin-right:4px;align-self:center;}
  .done-badge{display:inline-flex;align-items:center;gap:7px;font-size:.76rem;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);font-weight:600;}
  .done-badge svg{width:16px;height:16px;fill:var(--teal);}
  .unmark{background:none;border:none;color:var(--muted);font-family:var(--font-ui);font-size:.76rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;text-decoration:underline;text-underline-offset:3px;}
  .unmark:hover{color:#000;}

  .dtable{width:100%;border-collapse:collapse;margin:16px 0 2px;}
  .dtable thead th{text-align:left;font-size:.64rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:0 12px 9px;border-bottom:1px solid var(--line);}
  .dtable tbody td{padding:13px 12px;border-bottom:1px solid var(--line);vertical-align:top;font-size:.92rem;line-height:1.45;}
  .dtable tbody tr:last-child td{border-bottom:none;}
  .dtable .chkcell{width:26px;padding-right:0;}
  .dtable .pf{font-weight:600;color:var(--ink);white-space:nowrap;}
  .dtable .as{color:var(--ink);}
  .dtable .nt{color:var(--muted);font-size:.85rem;}
  .xtable .xcell{width:30px;padding-right:0;}
  .xtog{background:none;border:none;cursor:pointer;padding:4px;display:inline-flex;border-radius:6px;transition:.15s;}
  .xtog svg{width:17px;height:17px;fill:var(--gray);transition:.15s;}
  .xtog:hover svg{fill:#000;}
  .xtog.on svg{fill:#000;}
  .dtable tr.struck .pf,.dtable tr.struck .as,.dtable tr.struck .nt{color:#888;text-decoration:line-through;text-decoration-color:#888;}

  .finish{text-align:center;padding:48px 30px 44px;}
  .finish .mark{width:74px;height:74px;border-radius:50%;background:#000;display:grid;place-items:center;margin:0 auto 22px;box-shadow:0 16px 34px -16px rgba(0,0,0,.6);}
  .finish .mark svg{width:38px;height:38px;fill:var(--cyan);}
  .finish h1{font-size:1.6rem;margin:0 0 8px;color:var(--ink);font-weight:600;} .finish p{color:var(--muted);margin:0 auto 28px;max-width:380px;}

  .fade{animation:fade .34s cubic-bezier(.2,0,.2,1);}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .saved-flash{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#000;color:#fff;font-size:.76rem;letter-spacing:.08em;text-transform:uppercase;padding:9px 18px;border-radius:var(--radius-pill);opacity:0;transition:.25s;pointer-events:none;}
  .saved-flash.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

const TOTAL = STEPS.length;

let flashT;
function save(silent){
  localStorage.setItem(KEY, JSON.stringify(state));
  if(silent) return;
  const f=document.getElementById("flash"); f.classList.add("show"); clearTimeout(flashT);
  flashT=setTimeout(()=>f.classList.remove("show"),1100);
}
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

const card=document.getElementById("card");
const resetBtn=document.getElementById("resetBtn");

}

  let html=`<div class="rail">
      <div class="rail-top"><span>${prefix}Step ${i+1} of ${TOTAL}</span><span class="pct">${doneCount()}/${TOTAL} done</span></div>
      <div class="track"><div class="fill" style="width:${(doneCount()/TOTAL)*100}%"></div></div>
    </div>
    <div class="pad step fade">
      <div class="step-meta"><span class="dot"></span><span>Step ${n}</span></div>
      <h2>${s.title}</h2>
      <p class="lead">${fill(s.lead)}</p>`;

  if(s.links){
    html+=`<div class="links">`+s.links.map(l=>`<a href="${l.url}" target="_blank" rel="noopener">${l.label}
      <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3z"/></svg></a>`).join("")+`</div>`;
  }

  if(s.showTopics){
    const t=state.notes.topics?esc(state.notes.topics):"— (nothing captured in Step 2 yet)";
    html+=`<div class="note"><div class="note-h">Your Topics to Explore</div><div style="white-space:pre-wrap;color:var(--ink-soft)">${t}</div></div>`;
  }

  if(s.note){ html+=`<div class="note">${fill(s.note)}</div>`; }

  if(s.promptCopy){
    html+=`<div class="note"><div class="note-h">Your prompt — one click to copy</div>
      <div class="promptbox">${esc(buildPrompt())}</div>
      <button class="btn-prompt" id="copyPrompt"><svg viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11z"/></svg>Copy prompt</button></div>`;
  }

  if(s.noteBoxes){
    s.noteBoxes.forEach(b=>{
      const cls = b.fixed ? "" : "grow";
      const style = b.fixed ? `height:${b.h||192}px;overflow-y:auto;resize:vertical` : (b.h?`min-height:${b.h}px`:``);
      html+=`<div class="notebox"><span class="lab">${b.label}</span>
        <textarea class="${cls}" data-note="${b.key}" style="${style}" placeholder="${esc(b.ph)}">${esc(state.notes[b.key]||"")}</textarea>
        ${b.hint?`<div class="hint">${b.hint}</div>`:``}</div>`;
    });
  }

  if(s.fields){
    const shorts=s.fields.filter(f=>f.type==="short"), areas=s.fields.filter(f=>f.type==="area");
    if(shorts.length){
      html+=`<div class="field-row">`+shorts.map(f=>`<label class="fld"><span class="lab">${f.label}</span>
        <input type="text" data-field="${f.key}" placeholder="${esc(f.ph)}" value="${esc(state[f.key]||"")}"></label>`).join("")+`</div>`;
    }
    areas.forEach(f=>{ html+=`<label class="fld"><span class="lab">${f.label}</span>
      <textarea class="grow" data-field="${f.key}" placeholder="${esc(f.ph)}">${esc(state[f.key]||"")}</textarea></label>`; });
  }

  if(s.todos){
    const checked=s.todos.filter((_,j)=>state.subs[i+"-"+j]).length;
    html+=`<div class="todos"><div class="todos-h"><span>To-dos</span><span class="cnt">${checked}/${s.todos.length}</span></div>`;
    s.todos.forEach((t,j)=>{ const on=!!state.subs[i+"-"+j];
      if(j===s.fileCopyIndex){
        const supported=('showDirectoryPicker' in window);
        html+=`<div class="todo fcopy">
          <label class="fcopy-check"><input type="checkbox" data-sub="${i}-${j}" ${on?"checked":""}>
            <span class="box"><svg viewBox="0 0 24 24"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span></label>
          <span class="txt">${fill(t)}
            <span class="fcopy-status${on?" ok":""}" id="copyStatus">${supported?"Click to pick your PDFs, then the folder.":"Chrome/Edge only — otherwise move the files manually."}</span></span>
        </div>`;
      } else {
        html+=`<label class="todo"><input type="checkbox" data-sub="${i}-${j}" ${on?"checked":""}>
          <span class="box"><svg viewBox="0 0 24 24"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>
          <span class="txt">${fill(t)}</span></label>`;
      }
    });
    if(s.expand){ html+=`<details class="expand"><summary>${s.expand.summary}</summary><div class="expand-body">${fill(s.expand.html)}</div></details>`; }
    html+=`</div>`;
  }

  if(s.todoGroups){
    s.todoGroups.forEach((grp,g)=>{
      const checked=grp.items.filter((_,j)=>state.subs[i+"-g"+g+"-"+j]).length;
      html+=`<div class="todos"><div class="todos-h"><span>${grp.title}</span><span class="cnt">${checked}/${grp.items.length}</span></div>`;
      grp.items.forEach((t,j)=>{ const on=!!state.subs[i+"-g"+g+"-"+j];
        html+=`<label class="todo"><input type="checkbox" data-sub="${i}-g${g}-${j}" ${on?"checked":""}>
          <span class="box"><svg viewBox="0 0 24 24"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>
          <span class="txt">${fill(t)}</span></label>`;
      });
      html+=`</div>`;
    });
  }

  if(s.todoTable){
    const tt=s.todoTable, checked=tt.rows.filter((_,j)=>state.subs[i+"-"+j]).length;
    html+=`<div class="todos"><div class="todos-h"><span>To-dos</span><span class="cnt">${checked}/${tt.rows.length}</span></div>
      <table class="dtable"><thead><tr><th class="chkcell"></th>`+tt.cols.map(c=>`<th>${c}</th>`).join("")+`</tr></thead><tbody>`;
    tt.rows.forEach((r,j)=>{ const on=!!state.subs[i+"-"+j];
      html+=`<tr><td class="chkcell"><label class="chk"><input type="checkbox" data-sub="${i}-${j}" ${on?"checked":""}>
        <span class="box"><svg viewBox="0 0 24 24"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span></label></td>
        <td class="pf">${fill(r.platform)}</td><td class="as">${fill(r.assets)}</td><td class="nt">${fill(r.notes||"—")}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  if(s.outputTable){
    const ot=s.outputTable;
    html+=`<div class="todos"><div class="todos-h"><span>Outputs</span></div>
      <table class="dtable xtable"><thead><tr><th class="chkcell"></th><th class="xcell"></th>`+ot.cols.map(c=>`<th>${c}</th>`).join("")+`</tr></thead><tbody>`;
    ot.rows.forEach((r,j)=>{ const skip=!!state.subs[i+"-o-"+j], gen=!!state.subs[i+"-c-"+j];
      html+=`<tr class="${skip?"struck":""}">
        <td class="chkcell"><label class="chk"><input type="checkbox" data-sub="${i}-c-${j}" ${gen?"checked":""}>
          <span class="box"><svg viewBox="0 0 24 24"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span></label></td>
        <td class="xcell"><button class="xtog${skip?" on":""}" data-xtog="${i}-o-${j}" aria-label="Mark as not needed">
          <svg viewBox="0 0 24 24"><path d="M18.3 5.71 12 12.01 5.7 5.7 4.29 7.12 10.59 13.41l-6.3 6.3 1.42 1.41L12 14.83l6.29 6.3 1.42-1.41-6.3-6.31 6.3-6.3z"/></svg></button></td>
        <td class="pf">${fill(r.deliverable)}</td><td class="as">${fill(r.platform)}</td><td class="nt">${fill(r.notes||"—")}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;

  // guard
  let guardOk=true, guardMsg="";
  if(s.requires){ guardOk=s.requires.every(k=>(state[k]||"").trim()!==""); if(!guardOk) guardMsg="Add a week number and thesis to continue"; }

  html+=`<div class="nav"><button class="btn btn-ghost" id="back">← Back</button><div style="display:flex;align-items:center;gap:16px">`;
  if(isDone){
    html+=`<span class="done-badge"><svg viewBox="0 0 24 24"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>Complete</span>
      <button class="unmark" id="unmark">Unmark</button>
      <button class="btn btn-primary is-next" id="next">${i+1===TOTAL?"Finish →":"Next →"}</button>`;
  } else {
    if(!guardOk) html+=`<span class="guard-hint">${guardMsg}</span>`;
    html+=`<button class="btn btn-primary" id="complete" ${guardOk?"":"disabled"}><svg class="ck" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#19FCFC"/><path d="M10.4 15.4 7.2 12.2l-1.4 1.4 4.6 4.6 8.2-8.2-1.4-1.4z" fill="#000"/></svg>Mark complete</button>`;
  }
  html+=`</div></div>`;

  card.innerHTML=html;
  card.querySelectorAll("textarea.grow").forEach(autogrow);

  document.getElementById("back").onclick=()=>{ if(i>0){ state.current=i-1; save(true); render(); } };

  card.querySelectorAll("[data-note]").forEach(ta=>{
    ta.oninput=()=>{ state.notes[ta.dataset.note]=ta.value; autogrow(ta); save(true); };
  });
  card.querySelectorAll("[data-field]").forEach(inp=>{
    inp.oninput=()=>{ state[inp.dataset.field]=inp.value; if(inp.tagName==="TEXTAREA")autogrow(inp); save(true);
      const c=document.getElementById("complete");
      if(c){ const s2=STEPS[i]; const ok=!s2.requires||s2.requires.every(k=>(state[k]||"").trim()!==""); c.disabled=!ok;
        const h=card.querySelector(".guard-hint"); if(h)h.style.display=ok?"none":""; } };
  });
  card.querySelectorAll("[data-sub]").forEach(cb=>{
    cb.onchange=()=>{ state.subs[cb.dataset.sub]=cb.checked; save(true); updateCounts(i); };
  });
  card.querySelectorAll("[data-xtog]").forEach(btn=>{
    btn.onclick=()=>{ const k=btn.dataset.xtog; state.subs[k]=!state.subs[k];
      btn.classList.toggle("on", !!state.subs[k]);
      const tr=btn.closest("tr"); if(tr) tr.classList.toggle("struck", !!state.subs[k]);
      save(true); };
  });
  card.querySelectorAll(".out-copy").forEach(btn=>{
    btn.onclick=()=>{ const j=+btn.dataset.out, o=STEPS[state.current].outputs[j];
      copy(fillRaw(o.prompt)); const h0=btn.innerHTML; btn.classList.add("done"); btn.textContent="Copied ✓";
      setTimeout(()=>{btn.classList.remove("done"); btn.innerHTML=h0;},1100); };
  });
  card.querySelectorAll(".copyable").forEach(el=>{
    el.onclick=e=>{ e.preventDefault(); copy(fill(el.dataset.copy)); flick(el); };
  });
  card.querySelectorAll(".copychip[data-copy]").forEach(el=>{
    el.onclick=()=>{ copy(el.dataset.copy); flick(el); };
  });
  const cpP=document.getElementById("copyPrompt");
  if(cpP)cpP.onclick=()=>{ copy(buildPrompt()); const o=cpP.innerHTML; cpP.classList.add("done"); cpP.textContent="Copied ✓";
    setTimeout(()=>{cpP.classList.remove("done"); cpP.innerHTML=o;},1100); };

  const cf=document.getElementById("copyFiles"); if(cf)cf.onclick=copyReadings;

  const comp=document.getElementById("complete"); if(comp)comp.onclick=()=>{ state.done[i]=true; state.current=i+1; save(); render(); };
  const nxt=document.getElementById("next"); if(nxt)nxt.onclick=()=>{ state.current=i+1; save(true); render(); };
  const um=document.getElementById("unmark"); if(um)um.onclick=()=>{ state.done[i]=false; save(true); render(); };
}

function autogrow(ta){ ta.style.height="auto"; ta.style.height=Math.max(ta.scrollHeight,96)+"px"; }
function copy(t){ if(t!=null) navigator.clipboard.writeText(t).catch(()=>{}); }
function updateCounts(i){
  const s2=STEPS[i], cnts=card.querySelectorAll(".todos-h .cnt"); let idx=0;
  if(s2.todos){ const c=s2.todos.filter((_,j)=>state.subs[i+"-"+j]).length; if(cnts[idx])cnts[idx].textContent=`${c}/${s2.todos.length}`; idx++; }
  if(s2.todoGroups){ s2.todoGroups.forEach((grp,g)=>{ const c=grp.items.filter((_,j)=>state.subs[i+"-g"+g+"-"+j]).length; if(cnts[idx])cnts[idx].textContent=`${c}/${grp.items.length}`; idx++; }); }
  if(s2.todoTable){ const c=s2.todoTable.rows.filter((_,j)=>state.subs[i+"-"+j]).length; if(cnts[idx])cnts[idx].textContent=`${c}/${s2.todoTable.rows.length}`; idx++; }
}
function fillRaw(str){
  return (str||"").replaceAll("{week}",state.week||"[week #]")
    .replaceAll("{blog}",state.blog||"[post #]")
    .replaceAll("{thesis}",(state.thesis||"").trim()||"[thesis question]");
}
function buildPrompt(){
  const wk=state.week||"[week #]", bp=state.blog||"[post #]";
  const th=(state.thesis||"").trim()||"[thesis question]";
  return `Write my blog post for Week ${wk} Blog Post ${bp}. The post should focus on answering this question: ${th} References the attached readings notes and articles.`;
}
function flick(el){ el.classList.add("copied"); const o=el.textContent; if(!el.dataset.copy||el.classList.contains("copychip")){} setTimeout(()=>el.classList.remove("copied"),900); }

async function copyReadings(){
  const status=document.getElementById("copyStatus");
  if(!('showDirectoryPicker' in window)){ status.textContent="Chrome/Edge only — move the files manually."; return; }
  try{
    status.textContent="Select your reading PDFs…"; status.classList.remove("ok");
    const files=await window.showOpenFilePicker({multiple:true});
    status.textContent="Now choose the Learning Design Knowledgebase folder…";
    const dir=await window.showDirectoryPicker({mode:"readwrite"});
    let count=0;
    for(const fh of files){
      const file=await fh.getFile();
      const dest=await dir.getFileHandle(file.name,{create:true});
      const w=await dest.createWritable(); await w.write(await file.arrayBuffer()); await w.close(); count++;
    }
    status.textContent=`Copied ${count} file${count===1?"":"s"} ✓`; status.classList.add("ok");
    const cb=document.querySelector('.fcopy input[data-sub]');
    if(cb){ cb.checked=true; state.subs[cb.dataset.sub]=true; save(true);
      const s2=STEPS[state.current], el=document.querySelector(".todos-h .cnt");
      if(s2&&s2.todos&&el){ const c=s2.todos.filter((_,j)=>state.subs[state.current+"-"+j]).length; el.textContent=`${c}/${s2.todos.length}`; } }
  }catch(e){
    status.textContent=(e&&e.name==="AbortError")?"Cancelled — no files copied." :"Couldn't copy here — move the files manually.";
  }
}

function renderFinish(){
  card.innerHTML=`<div class="finish fade"><div class="mark"><svg viewBox="0 0 24 24"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
    <h1>Week ${state.week||""} is published. 🎉</h1>
    <p>All ${TOTAL} steps complete — from Canvas to Wix. Nicely done.</p>
    <button class="btn btn-primary" id="again">Start a new week →</button></div>`;
  document.getElementById("again").onclick=startNewWeek;
}

function startNewWeek(){
  if(!confirm("Start a new week? This clears your notes, thesis, and all checkmarks.")) return;
  state=fresh(); save(); render();
}
resetBtn.onclick=startNewWeek;
render();
</script>
</body>
</html>
